<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 608" width="820" height="608" role="img" aria-label="How I navigate the work — a Cynefin map. Complex: multi-agent orchestration, LLM evals, RAG, FrameSleuth (probe-sense-respond, emergent practice). Complicated: system architecture, Databricks platforms (sense-analyse-respond, good practice). Chaotic: non-deterministic failures, model and data drift (act-sense-respond, novel practice). Clear: boilerplates and scaffolding, proven CRUD patterns (sense-categorise-respond, best practice). Confusion sits in the center. A navigator orb continuously probes out from Confusion toward each domain and returns.">
  <defs>
    <filter id="mk" x="-6%" y="-30%" width="112%" height="160%"><feGaussianBlur stdDeviation="0.7"/></filter>
    <filter id="glow" x="-160%" y="-160%" width="420%" height="420%"><feGaussianBlur stdDeviation="3"/></filter>
    <radialGradient id="orb" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF"/><stop offset="35%" stop-color="#79C0FF"/><stop offset="100%" stop-color="#2F81F7" stop-opacity="0"/>
    </radialGradient>
    <style>
      .ser  { font-family: Georgia,'Times New Roman',serif; }
      .sans { font-family: 'Segoe UI',ui-sans-serif,Roboto,Helvetica,Arial,sans-serif; }
    </style>
  </defs>

  <!-- card -->
  <rect x="8" y="8" width="804" height="592" rx="16" fill="#FFFFFF" stroke="#D0D7DE" stroke-width="1.5"/>

  <g transform="translate(0,-32)">

