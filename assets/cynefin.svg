    <circle r="4" opacity="0"><animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.9;1" dur="1.2s" begin="0.3s" fill="freeze"/><animateMotion path="M410,390 C418,470 400,540 408,584 C414,602 395,606 398,588 C400,577 409,582 405,593" dur="1.2s" begin="0.3s" fill="freeze"/></circle>
    <circle r="4" opacity="0"><animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.9;1" dur="0.9s" begin="0.25s" fill="freeze"/><animateMotion path="M352,330 C280,322 150,338 50,330" dur="0.9s" begin="0.25s" fill="freeze"/></circle>
