    <g><rect x="500" y="188" width="0" height="22" rx="11" fill="#C2DEF0" filter="url(#mk)" opacity="0.9"><animate attributeName="width" values="0;210" dur="0.45s" begin="0.7s" fill="freeze" calcMode="spline" keySplines="0.3 0 0 1"/></rect><text x="605" y="203" text-anchor="middle" class="sans" font-size="13" fill="#1B3A4B" opacity="0"><animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.95s" fill="freeze"/>sense → analyse → respond</text></g>
