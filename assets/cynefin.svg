    <path d="M352,330 C280,322 150,338 50,330" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100"><animate attributeName="stroke-dashoffset" from="100" to="0" dur="0.9s" begin="0.25s" fill="freeze"/></path>
