<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 608" width="820" height="608" role="img" aria-label="How I navigate the work — a Cynefin map. Clear (sense-categorise-respond, best practice): Node/TypeScript microservice boilerplate, standard RAG and CI/CD plumbing, dataset-atlas data discovery. Complicated (sense-analyse-respond, good practice): Databricks lakehouse architecture, production MCP server and agent topology, crop-disease image classification. Complex (probe-sense-respond, emergent practice): multi-agent orchestration, RAG quality and agent evals, FrameSleuth video-to-code. Chaotic (act-sense-respond, novel practice): silent-wrong agent failures, model drift and runaway cost, crash recovery and retry loops. Confusion sits in the center. A navigator orb continuously probes out from Confusion toward each domain and returns.">
