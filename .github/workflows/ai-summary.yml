name: Self-updating AI summary

on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  models: read # access GitHub Models with the built-in token

jobs:
  summarize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Generate "What I'm shipping" summary
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_USER: ${{ github.repository_owner }}
        run: python scripts/ai_summary.py
      - name: Commit if changed
        run: |
          if ! git diff --quiet README.md; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "chore: refresh AI-generated shipping summary"
            git push
          else
            echo "No change."
          fi
